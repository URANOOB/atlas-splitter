device: auto
model: sam2-small

segmentation:
  confidence: 0.88
  stability: 0.92
  min_area: 400
  max_area_ratio: 0.45
  duplicate_iou: 0.80
  preserve_small: true
  sam2_points_per_side: 16
  sam2_points_per_batch: 16
  sam2_edge_padding: 4

processing:
  padding: 16
  crop_elements: false
  use_mixed_precision: true

output:
  include_psd: true
  include_png: true
  include_masks: true
  create_contact_sheet: true
  create_zip: true

grouping:
  enabled: false
  backend: qwen3-vl
  model: qwen3-vl-2b
  device: auto
  minimum_confidence: 0.70
  automatic_confidence: 0.80
  max_pieces_per_sheet: 25
  naming_language: en
  keep_semantic_inputs: false
