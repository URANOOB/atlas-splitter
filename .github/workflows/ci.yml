name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: '3.11'
          - os: ubuntu-latest
            python: '3.12'
          - os: ubuntu-latest
            python: '3.13'
          - os: windows-latest
            python: '3.11'
          - os: windows-latest
            python: '3.12'
    env:
      HF_HUB_OFFLINE: '1'
      TRANSFORMERS_OFFLINE: '1'
      ATLAS_SPLITTER_GPU_TEST: '0'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install test dependencies only
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev,geometry]'
      - name: Test without models or GPU
        run: python -m pytest --cov=atlas_splitter --cov-report=xml:coverage.xml --cov-report=term-missing
      - name: Ruff
        run: python -m ruff check .
      - name: MyPy
        run: python -m mypy
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}-py${{ matrix.python }}
          path: coverage.xml
          if-no-files-found: error
