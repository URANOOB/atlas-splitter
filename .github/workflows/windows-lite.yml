name: Windows Lite

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: python -m pip install --upgrade pip
      - run: powershell -ExecutionPolicy Bypass -File scripts/build-windows-lite.ps1 -Edition Lite
      - uses: actions/upload-artifact@v4
        with: { name: AtlasSplitter-Lite, path: dist }
