site_name: Atlas Splitter
site_description: Separación local de atlas 2D y extracción UV de GLB/glTF.
repo_url: https://github.com/URANOOB/atlas-splitter
theme:
  name: material
  language: es
  features: [navigation.tabs, navigation.sections, content.code.copy]
nav:
