  - Primeros pasos:
      - Instalación: getting-started/installation.md
      - Primer atlas: getting-started/first-split.md
      - Primer GLB: getting-started/first-glb-extraction.md
      - Windows portable: getting-started/windows-portable.md
  - Guías:
      - Segmentación visual: guides/visual-segmentation.md
      - Extracción GLB y UV: guides/glb-uv-extraction.md
      - Agrupación semántica: guides/semantic-grouping.md
      - Revisión manual: guides/manual-review.md
      - Blender: guides/blender.md
  - Referencia:
      - CLI: reference/cli.md
      - Configuración: reference/configuration.md
      - Manifiestos: reference/manifests.md
      - Salida: reference/output-structure.md
  - Conceptos:
      - Atlas: concepts/texture-atlas.md
      - Coordenadas UV: concepts/uv-coordinates.md
      - Límites: concepts/limitations.md
  - Problemas:
      - Instalación: troubleshooting/installation.md
      - CUDA y MPS: troubleshooting/cuda.md
      - Blender: troubleshooting/blender.md
      - GLB: troubleshooting/glb.md
  - Proyecto:
      - Contribuir: contributing.md
      - Seguridad: security.md
      - Cambios: changelog.md
